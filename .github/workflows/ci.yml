name: CI - Integración Continua

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Descarga el código del repositorio en la máquina virtual de GitHub
      - name: Checkout del Repositorio
        uses: actions/checkout@v6

      # Step 2: Instala el entorno de Node.js v24 habilitando el caché de npm para acelerar ejecuciones futuras
      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      # Step 3: Instala dependencias de manera limpia e idéntica a package-lock.json
      - name: Instalar Dependencias
        run: npm ci

      # Step 3.5: Realiza una auditoría de seguridad (OWASP Top 10 A06) sobre las dependencias
      - name: Auditoría de Seguridad (OWASP Dependency Check)
        run: npm audit --audit-level=high

      # Step 4: Compila TypeScript para validar que no haya errores sintácticos o de tipado
      - name: Construir Proyecto (Build)
        run: npm run build

      # Step 5: Corre toda la suite de pruebas unitarias y de integración
      - name: Ejecutar Pruebas (Tests)
        run: npm run test
